version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: panggil-in-postgres-prod
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=secureproductionpassword99
      - POSTGRES_DB=pangilin
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d pangilin"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: panggil-in-redis-prod
    ports:
      - "6379:6379"
    volumes:
      - redis_prod_data:/data
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  mosquitto:
    image: eclipse-mosquitto:2.0
    container_name: panggil-in-mosquitto-prod
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./infra/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf
      - mosquitto_prod_data:/mosquitto/data
      - mosquitto_prod_log:/mosquitto/log
    restart: always

  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    container_name: panggil-in-backend-prod
    expose:
      - "3001"
    environment:
      - PORT=3001
      - DATABASE_URL=postgresql://postgres:secureproductionpassword99@postgres:5432/pangilin?schema=public
      - REDIS_URL=redis://redis:6379
      - MQTT_BROKER_URL=mqtt://mosquitto:1883
      - JWT_SECRET=supersecureproductionjwttoken2026
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: always

  ai_server:
    build:
      context: ./apps/ai_server
      dockerfile: Dockerfile
    container_name: panggil-in-ai-server-prod
    expose:
      - "3002"
    environment:
      - BACKEND_URL=http://backend:3001
    depends_on:
      - backend
    restart: always

  nginx:
    image: nginx:alpine
    container_name: panggil-in-nginx-prod
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - ai_server
    restart: always

volumes:
  postgres_prod_data:
  redis_prod_data:
  mosquitto_prod_data:
  mosquitto_prod_log:
